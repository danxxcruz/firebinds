<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Firebinds</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="app">
      <header class="header">
        <div>
          <h1>Firebinds</h1>
          <p id="pageLabel" class="muted">Loading current page...</p>
        </div>
        <button id="refreshButton" class="icon-button" type="button" title="Refresh">↻</button>
      </header>

      <section id="profilePanel" class="profile-panel">
        <label class="field compact">
          <span>Profile</span>
          <select id="profileSelect"></select>
        </label>
        <span id="profileCount" class="count">0</span>
        <div class="profile-actions">
          <button id="newProfileButton" type="button">New</button>
          <button id="renameProfileButton" type="button">Rename</button>
          <button id="duplicateProfileButton" type="button">Duplicate</button>
          <button id="deleteProfileButton" type="button">Delete</button>
        </div>
      </section>

      <section id="notice" class="notice" hidden></section>

      <section id="controls" class="toolbar">
        <button id="addButton" class="primary" type="button">Add keybind</button>
        <label class="switch">
          <input id="indicatorsToggle" type="checkbox">
          <span>Indicators</span>
        </label>
      </section>

      <section id="formPanel" class="panel" hidden>
        <h2 id="formTitle">New keybind</h2>

        <label class="field">
          <span>Target method</span>
          <select id="targetModeSelect">
            <option value="picker">Pick element</option>
            <option value="text">Text</option>
            <option value="textPattern">Text pattern</option>
          </select>
        </label>

        <div id="pickerTargetPanel" class="target-panel">
          <p id="targetLabel" class="target">No element selected.</p>
          <button id="pickTargetButton" type="button">Pick element</button>
        </div>

        <label id="textTargetPanel" class="field" hidden>
          <span>Target text</span>
          <input id="textTargetInput" type="text" placeholder="Add New*">
        </label>

        <label class="field">
          <span>Scope</span>
          <select id="scopeSelect">
            <option value="page">This page</option>
            <option value="site">This site</option>
            <option value="global">Global</option>
          </select>
        </label>

        <label class="field">
          <span>Keybind</span>
          <button id="keyCapture" class="capture" type="button">Press keys</button>
        </label>

        <label class="check">
          <input id="editableToggle" type="checkbox">
          <span>Allow while typing in fields</span>
        </label>

        <div id="conflictPanel" class="conflict" hidden>
          <p id="conflictText"></p>
          <label class="check">
            <input id="replaceConflictToggle" type="checkbox">
            <span>Replace the existing binding</span>
          </label>
        </div>

        <div class="actions">
          <button id="saveButton" class="primary" type="button">Save</button>
          <button id="testTargetButton" type="button">Test target</button>
          <button id="cancelButton" type="button">Cancel</button>
        </div>
      </section>

      <section class="list-section">
        <div class="list-header">
          <h2>Current bindings</h2>
          <input id="searchInput" type="search" placeholder="Filter">
        </div>
        <div id="bindingsList" class="bindings"></div>
      </section>
    </main>

    <script src="../src/messages.js"></script>
    <script src="../src/key-combo.js"></script>
    <script src="../src/targeting.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
