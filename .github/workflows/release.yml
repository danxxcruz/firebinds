name: Release Extensions

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate source and manifests
        run: npm run validate

      - name: Check for version bump
        id: version
        shell: bash
        run: |
          version="$(node -p "require('./manifest.json').version")"
          tag="v${version}"

          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "Tag ${tag} already exists. Nothing to release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Package Firefox extension
        if: steps.version.outputs.should_release == 'true'
        run: npm run package:firefox

      - name: Package Chrome extension
        if: steps.version.outputs.should_release == 'true'
        run: npm run package:chrome

      - name: Create release tag
        if: steps.version.outputs.should_release == 'true'
        shell: bash
        run: |
          tag="${{ steps.version.outputs.tag }}"
          git tag "${tag}" "${GITHUB_SHA}"
          git push origin "refs/tags/${tag}"

      - name: Publish GitHub release
        if: steps.version.outputs.should_release == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.version.outputs.tag }}"
          version="${{ steps.version.outputs.version }}"

          gh release create "${tag}" \
            "dist/firebinds-firefox-${version}.zip" \
            "dist/firebinds-chrome-${version}.zip" \
            --repo "${{ github.repository }}" \
            --verify-tag \
            --title "Firebinds ${version}" \
            --notes "Automated Firefox and Chrome extension packages built from commit ${{ github.sha }}."
